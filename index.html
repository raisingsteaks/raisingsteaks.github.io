<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@raisingsteaks</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23FCAE91"/><g fill="none" stroke="%23161616" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(8 8) scale(2)"><path d="M16.4 13.7A6.5 6.5 0 1 0 6.28 6.6c-1.1 3.13-.78 3.9-3.18 6.08A3 3 0 0 0 5 18c4 0 8.4-1.8 11.4-4.3"/><path d="m18.5 6 2.19 4.5a6.48 6.48 0 0 1-2.29 7.2C15.4 20.2 11 22 7 22a3 3 0 0 1-2.68-1.66L2.4 16.5"/><circle cx="12.5" cy="8.5" r="2.5"/></g></svg>'>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Space+Mono:wght@400;700&family=Work+Sans:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #161616;
            --cream: #F9F5F0;
            --salmon: #FCAE91;
            --mint: #CEE2D5;
            --yellow: #F7D781;
            --paper: #fff;
            --handle: #C43D2D;
            --grid-strong: rgba(22, 22, 22, 0.72);
            --grid-soft: rgba(22, 22, 22, 0.14);
            --stroke-thin: 1.5px solid var(--ink);
            --stroke-thick: 3px solid var(--ink);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --ink: #F7EFE5;
                --cream: #171512;
                --salmon: #E98572;
                --mint: #14261F;
                --yellow: #9E7A35;
                --paper: #211E1A;
                --handle: #FF8B75;
                --grid-strong: rgba(247, 239, 229, 0.46);
                --grid-soft: rgba(247, 239, 229, 0.16);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            background: var(--cream);
            color: var(--ink);
            font-family: "Space Mono", monospace;
            overflow: hidden;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
            position: relative;
        }

        .left-zone {
            position: relative;
            background: var(--cream);
            border-right: var(--stroke-thick);
        }

        .right-zone {
            background-color: var(--mint);
            background-image:
                linear-gradient(var(--grid-strong) 1.5px, transparent 1.5px),
                linear-gradient(90deg, var(--grid-strong) 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            border-left: var(--stroke-thick);
            margin-left: -3px;
            position: relative;
        }

        .utility-header {
            height: 96px;
            border-bottom: var(--stroke-thick);
            background: var(--yellow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .barcode-faux {
            display: flex;
            height: 40px;
            gap: 3px;
            align-items: flex-end;
        }

        .bc-bar {
            width: 2px;
            height: 100%;
            background: var(--ink);
        }

        .bc-bar:nth-child(2n) {
            width: 4px;
        }

        .bc-bar:nth-child(3n) {
            height: 70%;
        }

        .bc-bar:nth-child(5n) {
            width: 6px;
        }

        .grid-mark {
            display: grid;
            grid-template-columns: repeat(2, 8px);
            grid-template-rows: repeat(2, 8px);
            gap: 2px;
        }

        .grid-mark span {
            border: var(--stroke-thin);
            background: transparent;
        }

        .utility-block {
            height: 140px;
            background: var(--cream);
            border-bottom: var(--stroke-thin);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .rule-line {
            height: 1.5px;
            background: var(--ink);
        }

        .rule-line.short {
            width: 60%;
        }

        .checkbox-row {
            display: flex;
            gap: 12px;
        }

        .checkbox-sq {
            width: 20px;
            height: 20px;
            border: var(--stroke-thin);
            background: var(--paper);
        }

        .checkbox-sq.filled {
            background: var(--ink);
        }

        .stamp-container {
            position: absolute;
            right: 40px;
            bottom: 40px;
            width: 120px;
            height: 120px;
            border: var(--stroke-thick);
            border-radius: 50%;
            background: var(--salmon);
            box-shadow: 6px 6px 0 var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-15deg);
        }

        .stamp-ring {
            width: 90px;
            height: 90px;
            border: 3px dashed var(--ink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .stamp-ring::before {
            content: "";
            position: absolute;
            inset: 7px;
            border: var(--stroke-thin);
            border-radius: 50%;
        }

        .stamp-steak {
            width: 36px;
            height: 36px;
            color: var(--ink);
            transform: rotate(13deg);
        }

        .ticket-wrapper {
            position: absolute;
            top: 50%;
            left: calc(100% - 380px);
            transform: translate(-50%, -50%);
            z-index: 2;
            width: min(420px, calc(100vw - 48px));
        }

        .ticket {
            min-height: 166px;
            background: var(--paper);
            border: var(--stroke-thick);
            box-shadow: 12px 12px 0 var(--ink);
            display: flex;
            align-items: center;
            padding: 32px 48px;
            position: relative;
        }

        .ticket::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 24px;
            width: 24px;
            background: var(--salmon);
            border-left: var(--stroke-thin);
            border-right: var(--stroke-thin);
        }

        .ticket::after {
            content: "";
            position: absolute;
            top: 12px;
            right: 12px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ink);
            box-shadow: 0 112px 0 var(--ink);
        }

        .ticket-content {
            position: relative;
            z-index: 1;
            width: 100%;
            padding-left: 40px;
        }

        .ticket-link {
            font-family: "Space Mono", monospace;
            font-weight: 700;
            font-size: 14px;
            line-height: 1.1;
            color: var(--ink);
            text-decoration: none;
            letter-spacing: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            column-gap: 12px;
            padding: 12px 16px 14px;
            border: var(--stroke-thin);
            background: var(--paper);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            width: 100%;
        }

        .ticket-link .handle {
            font-family: "Grand Hotel", cursive;
            font-size: clamp(40px, 3.5vw, 48px);
            font-weight: 400;
            line-height: 0.92;
            color: var(--handle);
            display: inline-flex;
            align-items: baseline;
            transform: rotate(-1.5deg);
            transform-origin: left center;
        }

        .ticket-link .handle-at {
            font-family: "Grand Hotel", cursive;
            font-size: 0.9em;
            font-weight: 400;
            line-height: 1;
            margin-right: -0.02em;
            transform: translateY(0.04em);
        }

        .ticket-link .handle-word {
            display: inline-block;
        }

        .ticket-link .platform {
            display: block;
            font-family: "Space Mono", monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
            align-self: end;
            padding-bottom: 3px;
        }

        .x-logo {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 1.1em;
            font-weight: 400;
            letter-spacing: 0;
        }

        .ticket-link:hover,
        .ticket-link:focus-visible {
            background: var(--yellow);
            transform: translate(-2px, -2px);
            box-shadow: 4px 4px 0 var(--ink);
            outline: none;
        }

        @media (max-width: 720px) {
            body {
                min-height: 100svh;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 28px 20px;
                background-color: var(--mint);
                background-image:
                    linear-gradient(var(--grid-soft) 1.5px, transparent 1.5px),
                    linear-gradient(90deg, var(--grid-soft) 1.5px, transparent 1.5px);
                background-size: 32px 32px;
            }

            .left-zone {
                display: none;
            }

            .right-zone {
                display: block;
                position: absolute;
                inset: 0;
                margin: 0;
                border: 0;
                z-index: 0;
                background-image:
                    linear-gradient(var(--grid-soft) 1.5px, transparent 1.5px),
                    linear-gradient(90deg, var(--grid-soft) 1.5px, transparent 1.5px);
            }

            .utility-header,
            .utility-block {
                display: none;
            }

            .stamp-container {
                width: 92px;
                height: 92px;
                right: 24px;
                bottom: 28px;
                box-shadow: 5px 5px 0 var(--ink);
                opacity: 0.95;
            }

            .stamp-ring {
                width: 68px;
                height: 68px;
            }

            .stamp-steak {
                width: 22px;
                height: 22px;
            }

            .ticket-wrapper {
                position: static;
                transform: none;
                width: min(100%, 360px);
            }

            .ticket {
                min-height: 184px;
                padding: 30px 26px;
                box-shadow: 8px 8px 0 var(--ink);
            }

            .ticket::before {
                left: 18px;
                width: 18px;
            }

            .ticket::after {
                top: 12px;
                right: 12px;
                box-shadow: 0 136px 0 var(--ink);
            }

            .ticket-content {
                padding-left: 28px;
            }

            .ticket-link {
                display: grid;
                width: 100%;
                font-size: 13px;
                line-height: 1.1;
                padding: 12px 14px;
            }

            .ticket-link .handle {
                font-size: clamp(35px, 9.8vw, 42px);
            }

            .ticket-link .platform {
                font-size: 10px;
                letter-spacing: 0.08em;
                padding-bottom: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="left-zone" aria-hidden="true"></div>

    <div class="right-zone" aria-hidden="true">
        <div class="utility-header">
            <div class="barcode-faux">
                <span class="bc-bar"></span><span class="bc-bar"></span><span class="bc-bar"></span>
                <span class="bc-bar"></span><span class="bc-bar"></span><span class="bc-bar"></span>
                <span class="bc-bar"></span><span class="bc-bar"></span><span class="bc-bar"></span>
                <span class="bc-bar"></span><span class="bc-bar"></span>
            </div>
            <span class="grid-mark">
                <span></span><span></span><span></span><span></span>
            </span>
        </div>
        <div class="utility-block">
            <div class="rule-line"></div>
            <div class="checkbox-row">
                <span class="checkbox-sq filled"></span>
                <span class="checkbox-sq"></span>
                <span class="checkbox-sq"></span>
            </div>
            <div class="rule-line"></div>
            <div class="rule-line short"></div>
        </div>
        <div class="stamp-container">
            <div class="stamp-ring">
                <svg class="stamp-steak" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M16.4 13.7A6.5 6.5 0 1 0 6.28 6.6c-1.1 3.13-.78 3.9-3.18 6.08A3 3 0 0 0 5 18c4 0 8.4-1.8 11.4-4.3" />
                    <path d="m18.5 6 2.19 4.5a6.48 6.48 0 0 1-2.29 7.2C15.4 20.2 11 22 7 22a3 3 0 0 1-2.68-1.66L2.4 16.5" />
                    <circle cx="12.5" cy="8.5" r="2.5" />
                </svg>
            </div>
        </div>
    </div>

    <main class="ticket-wrapper">
        <div class="ticket">
            <div class="ticket-content">
                <a href="https://x.com/raisingsteaks" class="ticket-link" aria-label="Visit @raisingsteaks on X">
                    <span class="handle"><span class="handle-at">@</span><span class="handle-word">raisingsteaks</span></span>
                    <span class="platform">is on <span class="x-logo">𝕏</span></span>
                </a>
            </div>
        </div>
    </main>
</body>
</html>
